$kind: http-request
url: '{{baseUrl}}auth/reset-password/token'
method: POST
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "grant": "{{resetGrant}}",
      "newPassword": "AnotherPassword@9999"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Password reset successful", function () {
        pm.expect(pm.response.code).to.equal(200);
      });
order: 13721
