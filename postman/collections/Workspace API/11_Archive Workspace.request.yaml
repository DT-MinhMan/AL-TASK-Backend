$kind: http-request
name: Archive Workspace
url: '{{baseUrl}}/workspaces/{{workspaceId}}'
method: PUT
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
body:
  type: json
  content: |-
    {
      "status": "archived"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Workspace archived", function () {
        pm.expect(pm.response.code).to.equal(200);
      });

      const workspace = pm.response.json();
      pm.test("Status is archived", function () {
        pm.expect(workspace.status).to.equal("archived");
      });
order: 12000
